<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Original Chat App</title>

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #eef4ff;
      }

      .chat {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-left: 1px solid #ccc;
        border-right: 1px solid #ccc;
      }

      .title {
        padding: 15px;
        background: #4169e1;
        color: white;
        text-align: center;
        font-size: 24px;
      }

      .setting {
        display: flex;
        gap: 8px;
        padding: 10px;
        background: #f5f5f5;
        border-bottom: 1px solid #ccc;
      }

      .nameInput {
        flex: 1;
        padding: 8px;
      }

      .colorInput {
        width: 60px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        list-style: none;
        padding: 15px;
        margin: 0;
      }

      .message {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 10px;
        background: #f1f1f1;
      }

      .myMessage {
        background: #d9ecff;
        text-align: right;
      }

      .userName {
        font-weight: bold;
      }

      .time {
        font-size: 12px;
        color: #777;
        margin-left: 8px;
      }

      .form {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ccc;
        background: #fafafa;
      }

      .input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
      }

      .submit {
        padding: 10px 20px;
        border: 1px solid #4169e1;
        background: #4169e1;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="chat">
      <div class="title">オリジナルチャットアプリ</div>

      <div class="setting">
        <input class="nameInput" placeholder="名前を入力" value="ゲスト" />
        <input class="colorInput" type="color" value="#4169e1" />
      </div>

      <ul class="messages"></ul>

      <form class="form">
        <input class="input" autocomplete="off" placeholder="メッセージを入力" />
        <button class="submit">Send</button>
      </form>
    </div>

    <script>
      function main() {
        const host = location.origin.replace(/^http/, 'ws')
        const ws = new WebSocket(host + '/ws')

        const myId = self.crypto.randomUUID().substring(0, 8)

        const form = document.querySelector('.form')
        const input = document.querySelector('.input')
        const nameInput = document.querySelector('.nameInput')
        const colorInput = document.querySelector('.colorInput')
        const messageList = document.querySelector('.messages')

        form.onsubmit = function (e) {
          e.preventDefault()

          const text = input.value.trim()
          if (text === '') {
            return
          }

          const now = new Date()
          const time = now.toLocaleTimeString('ja-JP', {
            hour: '2-digit',
            minute: '2-digit'
          })

          ws.send(
            JSON.stringify({
              id: myId,
              name: nameInput.value,
              color: colorInput.value,
              text: text,
              time: time
            })
          )

          input.value = ''
          input.focus()
        }

        ws.onmessage = function (event) {
          const msg = JSON.parse(event.data)

          const li = document.createElement('li')
          li.className = 'message'

          if (msg.id === myId) {
            li.classList.add('myMessage')
          }

          const name = document.createElement('span')
          name.className = 'userName'
          name.style.color = msg.color
          name.textContent = msg.name

          const time = document.createElement('span')
          time.className = 'time'
          time.textContent = msg.time

          const text = document.createElement('div')
          text.textContent = msg.text

          li.appendChild(name)
          li.appendChild(time)
          li.appendChild(text)

          messageList.appendChild(li)
          messageList.scrollTop = messageList.scrollHeight
        }

        ws.onerror = function (error) {
          console.error('WebSocket Error:', error)
        }
      }

      main()
    </script>
  </body>
</html>
